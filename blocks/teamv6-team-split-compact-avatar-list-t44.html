/**

 * 
 * Usage:
 * 1. Include this script in your page

 * 
 * Supported data-motion types:
 * - fade, fade-up, fade-down, fade-left, fade-right
 * - scale, scale-up
 * - blur, blur-up
 * - card, card-left, card-right

 * - data-delay="0.2" (seconds)
 * - data-duration="0.6" (seconds)

    const rect = el.getBoundingClientRect();
    return (
      rect.top < (window.innerHeight || document.documentElement.clientHeight) &&
      rect.bottom > 0 &&
      rect.left < (window.innerWidth || document.documentElement.clientWidth) &&
      rect.right > 0

    try {
      return window.self !== window.top;
    } catch (e) {

    }
  }

  function splitWords(element) {
    const text = element.textContent;
    const words = text.split(/(\s+)/);
    element.innerHTML = '';
    
    words.forEach(word => {
      if (word.trim()) {
        const span = document.createElement('span');
        span.className = 'motion-word';
        span.style.display = 'inline-block';
        span.style.opacity = '0';
        span.textContent = word;
        element.appendChild(span);
      } else {
        element.appendChild(document.createTextNode(word));
      }
    });
    
    element.style.opacity = '1';
    return element.querySelectorAll('.motion-word');

      styles.transform = effectiveAnim.transform[0];
    }
    if (effectiveAnim.filter) {
      styles.filter = effectiveAnim.filter[0];
    }
    
    return styles;
  }

    const styles = getInitialStyles(type);
    Object.assign(el.style, styles);
  }

      const words = splitWords(el);
      const delay = parseFloat(el.dataset.delay) || 0;
      const wordDelay = parseFloat(el.dataset.wordDelay) || defaults.wordDelay;
      const duration = parseFloat(el.dataset.duration) || 0.6;

      const animateWords = () => {
        words.forEach((word, i) => {
          animate(word, 
            { 
              opacity: [0, 1], 
              transform: ['translateY(20px)', 'translateY(0)'],
              filter: ['blur(10px)', 'blur(0px)']
            },
            { 
              duration: duration, 
              delay: delay + (i * wordDelay), 
              easing: [0.25, 0.1, 0.25, 1]
            }
          );
        });
      };

      // In iframe or already visible: animate immediately
      if (inIframe || isInViewport(el)) {
        setTimeout(animateWords, 100);
      } else {
        inView(el, animateWords, { amount: defaults.threshold });
      }
    });

    // Process motion animations
    document.querySelectorAll('[data-motion]').forEach(el => {
      const type = el.dataset.motion;
      const anim = animations[type];
      
      // Skip container types (explicitly set to null)
      if (anim === null) {
        el.style.opacity = '1';
        return;
      }
      
      // Use default animation for unknown types
      const effectiveAnim = anim === undefined ? defaultAnimation : anim;

      const delay = parseFloat(el.dataset.delay) || 0;
      const duration = parseFloat(el.dataset.duration) || defaults.duration;
      const threshold = parseFloat(el.dataset.threshold) || defaults.threshold;

      // Hide initially
      hideElement(el, type);

      const animateEl = () => {
        animate(el, effectiveAnim, { 
          duration: duration, 
          delay: delay, 
          easing: [0.25, 0.1, 0.25, 1]
        });
      };

      // In iframe or already visible: animate immediately
      if (inIframe || isInViewport(el)) {
        setTimeout(animateEl, 100);
      } else {
        inView(el, animateEl, { amount: threshold });
      }
    });

    // Handle staggered children
    document.querySelectorAll('[data-stagger]').forEach(parent => {
      const stagger = parseFloat(parent.dataset.stagger) || defaults.stagger;
      const children = parent.querySelectorAll('[data-motion]');
      
      children.forEach((child, i) => {
        const currentDelay = parseFloat(child.dataset.delay) || 0;
        child.dataset.delay = (currentDelay + (i * stagger)).toString();
      });
    });
  }

  // Run on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

  </script>
</body>
