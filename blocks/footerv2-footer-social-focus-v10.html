  <script>
/**
 * Motion Animate - Universal scroll animation library
 * Drop-in replacement for per-block animation scripts
 * 
 * Usage:
 * 1. Include this script in your page
 * 2. Add data-motion="type" to elements you want to animate
 * 3. Add data-animate="heading|text" to text elements for word splitting
 * 
 * Supported data-motion types:
 * - fade, fade-up, fade-down, fade-left, fade-right
 * - scale, scale-up
 * - blur, blur-up
 * - card, card-left, card-right
 * - button, badge, icon, image, input
 * - container (for grouping)
 * 
 * Options via data attributes:
 * - data-delay="0.2" (seconds)
 * - data-duration="0.6" (seconds)
 * - data-stagger="0.1" (for parent containers)
 * 
 * IMPORTANT: This file handles ONLY scroll animations and accordions.
 * Interactive functionality (carousels, tabs, pricing toggles) are included
 * as inline <script> tags within each block's <section> tag. This ensures
 * interactive features work even if animations are disabled.
 */

(function() {
  'use strict';

  // Default animation configs by type - tuned for smooth, creamy feel
  const animations = {
    // Basic fades
    'fade': { opacity: [0, 1] },
    'fade-up': { opacity: [0, 1], transform: ['translateY(40px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'fade-down': { opacity: [0, 1], transform: ['translateY(-40px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'fade-left': { opacity: [0, 1], transform: ['translateX(40px)', 'translateX(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'fade-right': { opacity: [0, 1], transform: ['translateX(-40px)', 'translateX(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    
    // Scale animations
    'scale': { opacity: [0, 1], transform: ['scale(0.9)', 'scale(1)'], filter: ['blur(10px)', 'blur(0px)'] },
    'scale-up': { opacity: [0, 1], transform: ['scale(0.85) translateY(30px)', 'scale(1) translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    
    // Blur animations
    'blur-sm': { opacity: [0, 1], filter: ['blur(15px)', 'blur(0px)'] },
    'blur-up': { opacity: [0, 1], transform: ['translateY(30px)', 'translateY(0)'], filter: ['blur(15px)', 'blur(0px)'] },
    
    // Component-specific - matched to original block animations
    'card': { opacity: [0, 1], transform: ['translateY(40px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'card-left': { opacity: [0, 1], transform: ['translateX(-40px)', 'translateX(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'card-right': { opacity: [0, 1], transform: ['translateX(40px)', 'translateX(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'button': { opacity: [0, 1], transform: ['translateY(20px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    'badge': { opacity: [0, 1], transform: ['translateY(-15px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    'icon': { opacity: [0, 1], transform: ['scale(0.8)', 'scale(1)'], filter: ['blur(8px)', 'blur(0px)'] },
    'image': { opacity: [0, 1], transform: ['scale(0.9)', 'scale(1)'], filter: ['blur(15px)', 'blur(0px)'] },
    'input': { opacity: [0, 1], transform: ['translateY(20px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    
    // Additional types found in blocks
    'stat': { opacity: [0, 1], transform: ['translateY(30px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'feature': { opacity: [0, 1], transform: ['translateY(30px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'accordion': { opacity: [0, 1], transform: ['translateY(20px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    'logo': { opacity: [0, 1], transform: ['scale(0.9)', 'scale(1)'], filter: ['blur(8px)', 'blur(0px)'] },
    'item': { opacity: [0, 1], transform: ['translateY(25px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    'avatar': { opacity: [0, 1], transform: ['scale(0.8)', 'scale(1)'], filter: ['blur(8px)', 'blur(0px)'] },
    'avatars': { opacity: [0, 1], transform: ['scale(0.8)', 'scale(1)'], filter: ['blur(8px)', 'blur(0px)'] },
    'social-proof': { opacity: [0, 1], transform: ['translateY(20px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    'social': { opacity: [0, 1], transform: ['translateY(15px)', 'translateY(0)'], filter: ['blur(5px)', 'blur(0px)'] },
    'col': { opacity: [0, 1], transform: ['translateY(30px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'row': { opacity: [0, 1], transform: ['translateY(25px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    'column': { opacity: [0, 1], transform: ['translateY(30px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'tabs': { opacity: [0, 1], transform: ['translateY(20px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    'cta': { opacity: [0, 1], transform: ['translateY(25px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'toggle': { opacity: [0, 1], transform: ['scale(0.9)', 'scale(1)'], filter: ['blur(5px)', 'blur(0px)'] },
    'carousel': { opacity: [0, 1], transform: ['translateY(30px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'step': { opacity: [0, 1], transform: ['translateX(-30px)', 'translateX(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'marquee': { opacity: [0, 1], filter: ['blur(10px)', 'blur(0px)'] },
    'timeline-item': { opacity: [0, 1], transform: ['translateY(40px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'heading': { opacity: [0, 1], transform: ['translateY(20px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] },
    'text': { opacity: [0, 1], transform: ['translateY(15px)', 'translateY(0)'], filter: ['blur(8px)', 'blur(0px)'] },
    
    // Container types (no animation, just for grouping)
    'container': null,
    'hero': null,
    'content': null,
    'header': null
  };

  // Default animation for any unknown type - smooth fade up with blur
  const defaultAnimation = { opacity: [0, 1], transform: ['translateY(30px)', 'translateY(0)'], filter: ['blur(10px)', 'blur(0px)'] };

  // Default timing - tuned for smooth, creamy animations
  const defaults = {
    duration: 0.7,
    delay: 0,
    stagger: 0.12,
    threshold: 0.2,
    wordDelay: 0.03
  };

  // Check if element is in viewport
  function isInViewport(el) {
    const rect = el.getBoundingClientRect();
    return (
      rect.top < (window.innerHeight || document.documentElement.clientHeight) &&
      rect.bottom > 0 &&
      rect.left < (window.innerWidth || document.documentElement.clientWidth) &&
      rect.right > 0
    );
  }

  // Check if we're in an iframe
  function isInIframe() {
    try {
      return window.self !== window.top;
    } catch (e) {
      return true;
    }
  }

  // Split text into words
  function splitWords(element) {
    const text = element.textContent;
    const words = text.split(/(\s+)/);
    element.innerHTML = '';
    
    words.forEach(word => {
      if (word.trim()) {
        const span = document.createElement('span');
        span.className = 'motion-word';
        span.style.display = 'inline-block';
        span.style.opacity = '0';
        span.textContent = word;
        element.appendChild(span);
      } else {
        element.appendChild(document.createTextNode(word));
      }
    });
    
    element.style.opacity = '1';
    return element.querySelectorAll('.motion-word');
  }

  // Get initial styles for hiding element
  function getInitialStyles(type) {
    const anim = animations[type];
    
    // Use default animation for unknown types (but not for container types which are explicitly null)
    const effectiveAnim = anim === undefined ? defaultAnimation : anim;
    
    if (!effectiveAnim) return { opacity: '0' };
    
    const styles = { opacity: '0' };
    
    if (effectiveAnim.transform) {
      styles.transform = effectiveAnim.transform[0];
    }
    if (effectiveAnim.filter) {
      styles.filter = effectiveAnim.filter[0];
    }
    
    return styles;
  }

  // Apply initial hidden styles
  function hideElement(el, type) {
    const styles = getInitialStyles(type);
    Object.assign(el.style, styles);
  }

  // Initialize animations
  function init() {
    // Wait for Motion.js
    if (!window.Motion) {
      console.warn('Motion.js not loaded. Showing all elements.');
      document.querySelectorAll('[data-motion], [data-animate]').forEach(el => {
        el.style.opacity = '1';
      });
      return;
    }

    const { animate, inView } = window.Motion;
    const inIframe = isInIframe();

    // Process text animations
    document.querySelectorAll('[data-animate]').forEach(el => {
      const type = el.dataset.animate;
      const words = splitWords(el);
      const delay = parseFloat(el.dataset.delay) || 0;
      const wordDelay = parseFloat(el.dataset.wordDelay) || defaults.wordDelay;
      const duration = parseFloat(el.dataset.duration) || 0.6;

      const animateWords = () => {
        words.forEach((word, i) => {
          animate(word, 
            { 
              opacity: [0, 1], 
              transform: ['translateY(20px)', 'translateY(0)'],
              filter: ['blur(10px)', 'blur(0px)']
            },
            { 
              duration: duration, 
              delay: delay + (i * wordDelay), 
              easing: [0.25, 0.1, 0.25, 1]
            }
          );
        });
      };

      // In iframe or already visible: animate immediately
      if (inIframe || isInViewport(el)) {
        setTimeout(animateWords, 100);
      } else {
        inView(el, animateWords, { amount: defaults.threshold });
      }
    });

    // Process motion animations
    document.querySelectorAll('[data-motion]').forEach(el => {
      const type = el.dataset.motion;
      const anim = animations[type];
      
      // Skip container types (explicitly set to null)
      if (anim === null) {
        el.style.opacity = '1';
        return;
      }
      
      // Use default animation for unknown types
      const effectiveAnim = anim === undefined ? defaultAnimation : anim;

      const delay = parseFloat(el.dataset.delay) || 0;
      const duration = parseFloat(el.dataset.duration) || defaults.duration;
      const threshold = parseFloat(el.dataset.threshold) || defaults.threshold;

      // Hide initially
      hideElement(el, type);

      const animateEl = () => {
        animate(el, effectiveAnim, { 
          duration: duration, 
          delay: delay, 
          easing: [0.25, 0.1, 0.25, 1]
        });
      };

      // In iframe or already visible: animate immediately
      if (inIframe || isInViewport(el)) {
        setTimeout(animateEl, 100);
      } else {
        inView(el, animateEl, { amount: threshold });
      }
    });

    // Handle staggered children
    document.querySelectorAll('[data-stagger]').forEach(parent => {
      const stagger = parseFloat(parent.dataset.stagger) || defaults.stagger;
      const children = parent.querySelectorAll('[data-motion]');
      
      children.forEach((child, i) => {
        const currentDelay = parseFloat(child.dataset.delay) || 0;
        child.dataset.delay = (currentDelay + (i * stagger)).toString();
      });
    });
  }

  // Run on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

  </script>
</body>
</html>
